services:
  mysql:
    image: mysql:8.0
    container_name: tinder-iesgo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tinder_iesgo
      MYSQL_USER: tinder
      MYSQL_PASSWORD: tinder123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
